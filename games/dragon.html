<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射龍門 | 子熙賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/dragon.css">
</head>

<body class="dragon-body">

    <div class="page-header">
        <a href="/games/casino.html" class="back-btn">← 返回賭場</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <h1>🎯 射龍門</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計押注: <span id="total-bet-val">0.00</span> 子熙幣</div>
        </div>

        <div class="dragon-table">
            <div class="card-lane">
                <div class="card-title">左門</div>
                <div class="playing-card" id="card-left">?</div>
            </div>
            <div class="card-lane center">
                <div class="card-title">開獎牌</div>
                <div class="playing-card reveal" id="card-shot">?</div>
            </div>
            <div class="card-lane">
                <div class="card-title">右門</div>
                <div class="playing-card" id="card-right">?</div>
            </div>
        </div>

        <div class="mode-switch">
            <button id="mode-classic" class="mode-btn active" disabled>傳統策略模式</button>
        </div>

        <div id="odds-banner">單副 52 張不放回抽牌，門越窄倍數越高：3x / 2x / 1.2x（撞柱雙倍扣注）</div>

        <div id="dragon-side-guess" class="dragon-side-guess hidden">
            <div class="guess-title">無門寬，請改猜方向</div>
            <div class="guess-actions">
                <button type="button" class="guess-btn" id="guess-lower-btn" onclick="setDragonSideGuess('lower')">猜下</button>
                <button type="button" class="guess-btn" id="guess-higher-btn" onclick="setDragonSideGuess('higher')">猜上</button>
            </div>
        </div>

        <input type="number" id="bet-amount" value="10" min="1" placeholder="輸入押注金額">
        <button class="btn-shoot" id="shoot-btn" onclick="playDragon()">開槍</button>

        <p id="status-msg">準備開始...</p>
        <div id="tx-log"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dragon.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
            });
        };
    </script>

    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

</body>

</html>
