services:
  # API Backend (Fastify + PostgreSQL)
  - type: web
    name: zixi-casino-api
    env: node
    plan: free
    region: oregon
    buildCommand: npx --yes pnpm@10.33.0 install && npx --yes pnpm@10.33.0 build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

