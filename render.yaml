services:
  # API Backend
  - type: web
    name: zixi-casino
    env: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: node render-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_INSTALL
        value: "false"

