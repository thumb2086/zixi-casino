<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賓果 | 子熙賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/bingo.css">
</head>

<body class="bingo-body">

    <div class="page-header">
        <a href="/" class="back-btn">← 大廳</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <h1>🎯 賓果 (Bingo)</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計押注: <span id="total-bet-val">0.00</span> 子熙幣</div>
        </div>

        <div class="bingo-stage">
            <div class="round-hint" id="round-hint">固定開獎模式：計算中...</div>
            <div class="bingo-grid" id="drawn-grid"></div>
        </div>

        <div class="form-row">
            <input type="number" id="bet-amount" value="10" min="1" placeholder="輸入押注金額">
            <button class="btn-secondary" onclick="randomPick()">隨機選 8</button>
        </div>
        <input type="text" id="number-input" placeholder="輸入 8 個號碼，用逗號分隔 (1-75)">

        <button class="btn-primary" onclick="placeBingoBet()">下注開獎</button>

        <p id="status-msg">準備開始...</p>
        <div id="tx-log"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/bingo.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                initBingoPage();
            });
        };
    </script>

</body>

</html>
