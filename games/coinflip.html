<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜硬幣 | 子熙賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/coinflip.css">
</head>

<body class="coinflip-body">

    <div class="page-header">
        <a href="/games/casino.html" class="back-btn">← 返回賭場</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <h1>🪙 猜硬幣</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計押注: <span id="total-bet-val">0.00</span> 子熙幣</div>
        </div>

        <div class="coin-box">
            <div id="main-coin" class="coin">
                <div class="coin-face side-heads">
                    <span class="coin-symbol">正</span>
                    <span class="coin-label">HEADS</span>
                </div>
                <div class="coin-face side-tails">
                    <span class="coin-symbol">反</span>
                    <span class="coin-label">TAILS</span>
                </div>
            </div>
        </div>

        <input type="number" id="bet-amount" value="10" min="1" placeholder="輸入金額">

        <div id="odds-banner">🔥 賠率 1.8 倍 (獲利 80%) 🔥</div>
        <div class="round-hint" id="round-hint">固定開獎模式：計算中...</div>

        <div class="btn-group">
            <button class="btn-heads" onclick="play('heads')" id="play-btn">賭 正面</button>
            <button class="btn-tails" onclick="play('tails')" id="play-btn-2">賭 反面</button>
        </div>

        <p id="status-msg">準備開始...</p>

        <div id="tx-log"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/coinflip.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
            });
        };
    </script>

</body>

</html>
