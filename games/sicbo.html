<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰寶 | 子熙賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/sicbo.css">
</head>

<body class="sicbo-body">
    <div class="page-header">
        <a href="/games/casino.html" class="back-btn">返回賭場</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <h1>骰寶</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計下注: <span id="total-bet-val">0.00</span> 子熙幣</div>
        </div>

        <div class="sicbo-stage">
            <div class="dice-row" id="dice-row">
                <span class="die" id="die-1">?</span>
                <span class="die" id="die-2">?</span>
                <span class="die" id="die-3">?</span>
            </div>
            <div class="round-hint" id="round-hint">正在同步局勢...</div>
        </div>

        <div class="input-group compact-input-group">
            <label for="bet-amount">下注金額</label>
            <input type="number" id="bet-amount" value="10" min="1" placeholder="輸入下注金額">
        </div>
        <div class="bet-limit-note" id="max-bet-note">單注上限讀取中...</div>

        <div class="bet-panel">
            <div class="bet-type-grid" id="bet-type-grid"></div>
            <div class="bet-value-grid" id="bet-value-grid"></div>
        </div>

        <button class="btn-primary" onclick="placeSicboBet()">下注開獎</button>

        <p id="status-msg">等待下注...</p>
        <div id="tx-log"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sicbo.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                initSicboGame();
            });
        };
    </script>
</body>

</html>
