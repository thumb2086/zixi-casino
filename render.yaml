services:
  # API Backend (Fastify + PostgreSQL)
  - type: web
    name: zixi-casino-api
    env: node
    plan: free
    region: oregon
    buildCommand: npx --yes pnpm@10.33.0 install && npx --yes pnpm@10.33.0 --filter @repo/api... build && npx --yes pnpm@10.33.0 --filter web build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

  # Uncomment below on a paid Render plan to run the tx-intent worker as a
  # separate service:
