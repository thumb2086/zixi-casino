<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老虎機 | 閃電賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/slots.css">
</head>

<body class="slots-body">

    <div class="page-header">
        <a href="/" class="back-btn">← 大廳</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> ZXC</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <h1>🎰 老虎機</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">餘額: <span id="balance-val">0.00</span> ZXC</div>
            <div class="stat-row">累計押注: <span id="total-bet-val">0.00</span> ZXC</div>
        </div>

        <div class="slots-machine">
            <div class="reels-container">
                <div class="reel">
                    <div class="reel-strip" id="reel-1"></div>
                </div>
                <div class="reel">
                    <div class="reel-strip" id="reel-2"></div>
                </div>
                <div class="reel">
                    <div class="reel-strip" id="reel-3"></div>
                </div>
                <div class="payline" id="payline"></div>
            </div>

            <div class="payout-info">
                <div class="payout-item">
                    <span class="payout-symbol">7️⃣7️⃣7️⃣</span>
                    <span class="payout-mult">50x</span>
                    <span class="payout-rate">0.2%</span>
                </div>
                <div class="payout-item">
                    <span class="payout-symbol">💎💎💎</span>
                    <span class="payout-mult">15x</span>
                    <span class="payout-rate">0.8%</span>
                </div>
                <div class="payout-item">
                    <span class="payout-symbol">⭐⭐⭐</span>
                    <span class="payout-mult">8x</span>
                    <span class="payout-rate">1.5%</span>
                </div>
                <div class="payout-item">
                    <span class="payout-symbol">🔔🔔🔔</span>
                    <span class="payout-mult">5x</span>
                    <span class="payout-rate">2.0%</span>
                </div>
                <div class="payout-item">
                    <span class="payout-symbol">🍋🍋🍋</span>
                    <span class="payout-mult">3x</span>
                    <span class="payout-rate">2.5%</span>
                </div>
                <div class="payout-item">
                    <span class="payout-symbol">🍒🍒🍒</span>
                    <span class="payout-mult">2x</span>
                    <span class="payout-rate">3.0%</span>
                </div>
            </div>
            <p class="slots-odds-note">三連總中獎率固定 10%。其中 50x 為 0.2%，15x 為 0.8%，8x 為 1.5%，5x 為 2%，3x 為 2.5%，2x 為 3%。</p>
        </div>

        <div class="spin-controls">
            <input type="number" id="bet-amount" value="10" min="1" placeholder="輸入押注金額">
            <button class="btn-spin" id="spin-btn" onclick="spin()">🎰 旋轉</button>
        </div>

        <p id="status-msg">準備開始...</p>

        <div id="tx-log"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/slots.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                buildReels();
            });
        };
    </script>

</body>

</html>
